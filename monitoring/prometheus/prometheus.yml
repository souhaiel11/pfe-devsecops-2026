global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'devsecops-pfe'
    env: 'staging'

rule_files:
  - "alert-rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []  # Configurer Alertmanager si nécessaire

scrape_configs:

  - job_name: 'spring-boot-app'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['devsecops-app:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'jenkins'
    metrics_path: '/prometheus'
    static_configs:
      - targets: ['devsecops-jenkins:8090']
